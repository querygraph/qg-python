name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync environment (core + crypto + agents + mcp + test extras)
        run: uv sync --extra test --extra crypto --extra agents --extra mcp

      # The Rust equivalence suite needs the qg-rust sibling checkout plus the
      # grust/lakecat path dependencies; it runs in the qg-rust stack CI, not here.
      - name: Run tests
        run: uv run pytest tests/ -q --ignore=tests/test_rust_equivalence.py

      - name: Build wheel and sdist
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*
